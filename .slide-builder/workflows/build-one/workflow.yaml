# Build One Workflow - Single or Deck Slide Generation
# Generates a slide from plan.yaml using a matching template or frontend-design skill
name: build-one
description: "Build the next slide (or single planned slide) from plan using theme"
author: "Slide Builder"
version: "2.0"

# Path variables
installed_path: "{project-root}/.slide-builder/workflows/build-one"

# Config paths (shareable brand assets)
config_path: "{project-root}/.slide-builder/config"
theme_file: "{config_path}/theme.json"
templates_dir: "{config_path}/templates"
samples_dir: "{config_path}/samples"

# Workflow components
instructions: "{installed_path}/instructions.md"

# State and plan files
status_file: "{project-root}/.slide-builder/status.yaml"
single_plan: "{project-root}/output/singles/plan.yaml"
# deck_plan is dynamic: output/{deck_slug}/plan.yaml (read deck_slug from status.yaml)

# Output locations - now uses project-root/output/ for clean separation
output_root: "{project-root}/output"
single_output_dir: "{output_root}/singles"
deck_output_dir: "{output_root}"  # Deck slides go to output/{slug}/slides/

# Legacy paths (for deck working files only)
deck_working_dir: "{project-root}/.slide-builder/deck"

# Template file mapping (suggested_template -> actual file)
# Maps intent-based layout names to sample files for reference
# Note: If templates/ dir is empty, samples are used as design reference
template_mapping:
  layout-title: "01-title.html"
  layout-list: "02-agenda.html"
  layout-flow: "03-flow.html"
  layout-columns-2: "04-comparison.html"
  layout-columns-3: "04-comparison.html"  # Fallback to 2-column
  layout-callout: "05-callout.html"
  layout-code: "06-technical.html"

# Intent keyword to template mapping (from Architecture Novel Pattern 2)
intent_keywords:
  layout-title:
    - "title"
    - "intro"
    - "opening"
    - "cover"
  layout-list:
    - "list"
    - "bullets"
    - "points"
    - "agenda"
    - "steps"
  layout-flow:
    - "flow"
    - "process"
    - "timeline"
    - "journey"
    - "workflow"
  layout-columns-2:
    - "compare"
    - "vs"
    - "two"
    - "side-by-side"
    - "before/after"
    - "ROI"
    - "numbers"
    - "metrics"
    - "resources"
  layout-columns-3:
    - "three"
    - "triad"
    - "options"
    - "landscape"
    - "products"
  layout-callout:
    - "key"
    - "insight"
    - "callout"
    - "cta"
    - "important"
    - "highlight"
    - "exercise"
    - "hands-on"
  layout-code:
    - "code"
    - "technical"
    - "api"
    - "commands"
    - "CLI"

# Slide status enum
slide_status:
  - "pending"
  - "built"
  - "failed"

# State file schema for deck slides
state_file_schema:
  slide: "number"
  edits: "[]"
  lastModified: "null"

# Variables
variables:
  workflow_version: "2.0"

template: false
standalone: true
